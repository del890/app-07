services:
  - type: web
    name: lotofacil-service
    runtime: python
    rootDir: service
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn service.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENV
        value: prod
      - key: LOG_LEVEL
        value: INFO
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in Render dashboard — never commit the real value
      - key: CORS_ORIGINS
        sync: false   # set to ["https://your-app.netlify.app"] in Render dashboard
