name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Zip up your frontend code along with your Dockerfile
      # (Exclude standard unneeded files like node_modules or git folders to keep it light)
      - name: Generate deployment package
        run: zip -r deploy.zip . -x "*.git*" "node_modules/*"

      # 2. Deploy directly to Elastic Beanstalk
      - name: Deploy to AWS Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: "frontend"
          environment_name: "Frontend-env"
          version_label: "frontend-${{ github.sha }}"
          region: "us-east-2" # Change to your AWS region
          deployment_package: deploy.zip