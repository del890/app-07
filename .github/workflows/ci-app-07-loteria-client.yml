name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build static files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Loteria client app image
        run: docker build -t client-build ./client

      - name: Extract generated files
        run: |
          docker create --name extract client-build
          docker cp extract:/usr/share/nginx/html ./dist
          docker rm extract
          zip -r ${{ github.run_id }}.zip dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact
          path: ${{ github.run_id }}.zip
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifact
          path: deploy-files

      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v18
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
          application_name: docker-gh
          environment_name: Dockergh-env
          existing_bucket_name: elasticbeanstalk-us-east-1-923445559289
          region: us-east-1
          version_label: ${{ github.sha }}
          deployment_package: deploy-files/${{ github.run_id }}.zip
